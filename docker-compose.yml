services:
  db:
    container_name: insitu-photos-db
    image: ankane/pgvector:latest
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=all", "-c", "track_activity_query_size=4096"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insitu_photos}
      POSTGRES_USER: ${POSTGRES_USER:-photos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photos_pass}
      ENABLE_DB_MONITORING: ${ENABLE_DB_MONITORING:-false}
      DB_O11Y_PASSWORD: ${DB_O11Y_PASSWORD:-db_o11y_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  redis:
    container_name: insitu-photos-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    container_name: insitu-photos-api
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-photos}:${POSTGRES_PASSWORD:-photos_pass}@db:5432/${POSTGRES_DB:-insitu_photos}
      REDIS_URL: redis://redis:6379/0
      PHOTO_ROOT: /photos
      CACHE_ROOT: /cache
      SECRET_KEY: ${SECRET_KEY:-temporary_secret_key_change_me}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin_password}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-none}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-development}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-1.0.0}
    depends_on:
      - db
      - redis
    volumes:
      - /mnt/user/photos:/photos:ro
      - ./cache:/cache
      - ./migrations:/app/alembic/versions

  worker:
    container_name: insitu-photos-worker
    build: ./backend
    command: ./start-worker.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-photos}:${POSTGRES_PASSWORD:-photos_pass}@db:5432/${POSTGRES_DB:-insitu_photos}
      REDIS_URL: redis://redis:6379/0
      PHOTO_ROOT: /photos
      CACHE_ROOT: /cache
      SECRET_KEY: ${SECRET_KEY:-temporary_secret_key_change_me}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin_password}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-none}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-development}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-1.0.0}
    depends_on:
      - db
      - redis
    volumes:
      - /mnt/user/photos:/photos:ro
      - ./cache:/cache
      - ./migrations:/app/alembic/versions

  ml-service:
    container_name: insitu-photos-ml
    # CPU Image:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    # For GPU (NVIDIA), uncomment below:
    # image: ghcr.io/immich-app/immich-machine-learning:v2.7.5-cuda
    # deploy:
     #  resources:
      #   reservations:
         # devices:
           # - driver: nvidia
             # count: 1
             # capabilities: [gpu]
    environment:
      - MACHINE_LEARNING_GPU_SAVED_MODEL_PATH=/cache/ml-model
    volumes:
      - ./cache/ml-models:/cache/ml-models


  frontend:
    container_name: insitu-photos-ui
    build: 
      context: ./frontend
      args:
        VITE_OTEL_EXPORTER_OTLP_ENDPOINT: ${VITE_OTEL_EXPORTER_OTLP_ENDPOINT:-none}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:

